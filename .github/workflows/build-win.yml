name: Build Windows installer

# Produce l'installer .exe su windows-latest (nativo, così better-sqlite3 si
# compila per Windows). Avvio manuale o al push di un tag v*.
on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build-win:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      # npm ci esegue il postinstall (electron-rebuild del modulo nativo).
      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Build installer
        run: npm run build:win

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: lexflow-windows-installer
          path: release/**/*.exe
          if-no-files-found: error
