appId: it.lexflow.app
productName: LexFlow
directories:
  buildResources: resources
  output: release/${version}

# Icona app: sorgente in resources/ (buildResources). electron-builder rileva
# automaticamente resources/icon.png (1024²) e resources/icon.icns; da questi
# genera .icns per il dmg (macOS) e .ico per l'installer NSIS (Windows) al momento
# del build, ciascuno sulla propria piattaforma. Per il logo definitivo basta
# sostituire resources/icon.png e rigenerare l'icns (vedi docs/BUILD-WINDOWS.md §8).
files:
  - out/**

# Il binario nativo (.node di better-sqlite3-multiple-ciphers) deve stare FUORI
# dall'asar per essere caricabile a runtime.
asarUnpack:
  - '**/*.node'

# Le migrazioni Drizzle vengono copiate in <resources>/drizzle: a runtime, con
# app.isPackaged, main/database/migrations.ts legge da process.resourcesPath/drizzle.
extraResources:
  - from: drizzle
    to: drizzle

mac:
  target:
    - dmg
  artifactName: ${productName}-Mac-${version}.${ext}
win:
  target:
    - nsis
  artifactName: ${productName}-Windows-${version}-Setup.${ext}
nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  deleteAppDataOnUninstall: false
